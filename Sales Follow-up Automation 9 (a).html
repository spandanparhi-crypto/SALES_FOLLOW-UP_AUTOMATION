    /* ---------------------------------------------------------------

    --------------------------------------------------------------- */
    function GlassCard({ children, className = "", onClick }) {
      return (
        <div 
          onClick={onClick}
          className={`relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl transition-all duration-300 hover:y-[-2px] hover:shadow-indigo-500/5 ${className}`}

          {children}
        </div>
      );
    }

    function StatusBadge({ status }) {
      const c = STATUS_COLOR[status] || "#3B82F6";
      return (
        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium border" style={{ color: c, borderColor: `${c}30`, backgroundColor: `${c}10` }}>
          <span className="h-1.5 w-1.5 rounded-full" style={{ backgroundColor: c }} />
          {status}
        </span>
      );
    }

    function ScoreRing({ score }) {
      const c = score >= 75 ? "#34D399" : score >= 50 ? "#A855F7" : "#3B82F6";
      const circumference = 2 * Math.PI * 12;
      const offset = circumference - (score / 100) * circumference;
      return (
        <div className="relative flex items-center justify-center h-8 w-8">
          <svg width="32" height="32" viewBox="0 0 32 32" class="transform -rotate-90">
            <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="2.5" />
            <circle
              cx="16" cy="16" r="12" fill="none" stroke={c} strokeWidth="2.5"
              strokeDasharray={circumference} strokeDashoffset={offset}
              strokeLinecap="round"
            />
          </svg>
          <span className="absolute text-[10px] font-bold tracking-tighter text-slate-200">{score}</span>
        </div>
      );
    }

            </GlassCard>

    /* ---------------------------------------------------------------
       CUSTOMERS RECORD COMPONENT PANEL
    --------------------------------------------------------------- */
    function CustomersView({ customers, setCustomers, onToast }) {
      const [search, setSearch] = useState("");
      const [showModal, setShowModal] = useState(false);
      const [form, setForm] = useState({ name: "", email: "", phone: "", company: "", tags: "", value: "" });

      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [customers, showModal]);

      const filtered = customers.filter(c => 
        [c.name, c.email, c.company].join(" ").toLowerCase().includes(search.toLowerCase())
      );

      const handleSubmit = (e) => {
        e.preventDefault();
        const newCustomer = {
          id: `C0${customers.length + 1}`,
          name: form.name,
          email: form.email,
          phone: form.phone || "+1 555 000 0000",
          company: form.company || "Independent",
          tags: form.tags ? [form.tags] : ["SMB"],
          createdAt: new Date().toISOString().split('T')[0],
          lastContact: "Just Now",
          value: Number(form.value) || 0
        };
        setCustomers([newCustomer, ...customers]);
        setShowModal(false);
        setForm({ name: "", email: "", phone: "", company: "", tags: "", value: "" });
        onToast(`Customer account profile for ${newCustomer.name} created successfully.`);
      };

      const handleExport = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customers, null, 2));
        const dlAnchor = document.createElement('a');
        dlAnchor.setAttribute("href", dataStr);
        dlAnchor.setAttribute("download", "nexus_customers_export.json");
        dlAnchor.click();
        onToast("Structured records compilation catalog dispatched for file download.");
      };

      return (
        <div className="space-y-6 animate-fadeIn">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div className="relative w-full sm:w-80">
              <span class="absolute inset-y-0 left-3 flex items-center text-slate-400 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4"></i>
              </span>
              <input 
                type="text" placeholder="Filter identity logs..." value={search} onChange={e => setSearch(e.target.value)}
                className="w-full bg-white/5 border border-white/10 rounded-xl pl-9 pr-4 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors"
              />
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
              <button onClick={handleExport} className="flex-1 sm:flex-none inline-flex items-center justify-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10 transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> Export Data
              </button>
              <button onClick={() => setShowModal(true)} className="flex-1 sm:flex-none inline-flex items-center justify-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-600/20 transition-all">
                <i data-lucide="plus" class="w-4 h-4"></i> Create Customer
              </button>
            </div>
          </div>

          <GlassCard class="p-0 overflow-x-auto border border-white/5 rounded-2xl">
            <table class="w-full text-left border-collapse min-w-[700px]">
              <thead>
                <tr class="border-b border-white/10 bg-white/[0.02] text-xs font-semibold uppercase tracking-wider text-slate-400">
                  <th class="py-4 px-6">Customer Matrix Ident</th>
                  <th class="py-4 px-6">Corporate Hub</th>
                  <th class="py-4 px-6">Classification Tags</th>
                  <th class="py-4 px-6">Last Action Outbound</th>
                  <th class="py-4 px-6">Asset Lifetime Valuation</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-white/5 text-sm text-slate-300">
                {filtered.map(c => (
                  <tr key={c.id} class="hover:bg-white/[0.01] transition-colors">
                    <td class="py-4 px-6 flex items-center gap-3">
                      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 flex items-center justify-center text-xs font-bold text-indigo-300">
                        {initials(c.name)}
                      </div>
                      <div>
                        <p class="font-medium text-white">{c.name}</p>
                        <p class="text-xs text-slate-400">{c.email}</p>
                      </div>
                    </td>
                    <td class="py-4 px-6 text-slate-200">{c.company}</td>
                    <td class="py-4 px-6">
                      {c.tags.map(t => (
                        <span key={t} class="inline-block px-2 py-0.5 rounded bg-white/5 border border-white/10 text-[11px] text-slate-400 font-medium">{t}</span>
                      ))}
                    </td>
                    <td class="py-4 px-6 font-mono text-xs text-slate-400">{c.lastContact}</td>
                    <td class="py-4 px-6 font-mono font-medium text-slate-100">{money(c.value)}</td>
                  </tr>
                ))}

            </table>

          {/* Modal Overlay Layer for Inbound Ingestions */}
          {showModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fadeIn">
              <div className="w-full max-w-md bg-slate-900 border border-white/10 rounded-2xl overflow-hidden shadow-2xl animate-scaleUp">
                <div class="px-6 py-4 border-b border-white/5 flex justify-between items-center">
                  <h3 class="text-base font-semibold text-white">Create New Customer Account</h3>
                  <button onClick={() => setShowModal(false)} class="text-slate-400 hover:text-slate-200">
                    <i data-lucide="x" class="w-5 h-5"></i>
                  </button>
                </div>
                <form onSubmit={handleSubmit} class="p-6 space-y-4">
                  <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Full Identification Name</label>
                    <input type="text" required value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" />
                  </div>
                  <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Electronic Mail Address</label>
                    <input type="email" required value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" />
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Organization / Brand</label>
                      <input type="text" value={form.company} onChange={e => setForm({...form, company: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" />
                    </div>
                    <div>
                      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Asset Valuation ($)</label>
                      <input type="number" value={form.value} onChange={e => setForm({...form, value: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" />
                    </div>
                  </div>
                  <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onClick={() => setShowModal(false)} class="px-4 py-2 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200">Abort</button>
                    <button type="submit" class="px-4 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700">Commit Record</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ---------------------------------------------------------------
       LEADS KANBAN INTERACTIVE TASKBOARD VIEW
    --------------------------------------------------------------- */
    function LeadsView({ leads, setLeads, onToast }) {
      const [draggingId, setDraggingId] = useState(null);

      const handleDragStart = (id) => { setDraggingId(id); };
      const handleDragOver = (e) => { e.preventDefault(); };
      
      const handleDrop = (targetStatus) => {
        if (!draggingId) return;
        setLeads(leads.map(l => l.id === draggingId ? { ...l, status: targetStatus, lastActivity: "Just Now" } : l));
        setDraggingId(null);
        onToast(`Lead execution routing status altered to: ${targetStatus}`);
      };

      return (
        <div className="space-y-4 animate-fadeIn">
          <p className="text-xs text-slate-400 bg-white/5 border border-white/5 px-4 py-2.5 rounded-xl inline-block">
            ℹ️ Drag and shift identity records between status lanes to change lifecycle positioning matrix variables.
          </p>
          <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-6 overflow-x-auto pb-4">
            {STATUS.map(columnStatus => {
              const columnLeads = leads.filter(l => l.status === columnStatus);
              return (
                <div 
                  key={columnStatus}
                  onDragOver={handleDragOver}
                  onDrop={() => handleDrop(columnStatus)}
                  className="flex flex-col min-w-[200px] bg-slate-900/50 border border-white/5 rounded-2xl p-3 h-[500px] overflow-y-auto transition-colors duration-200"
                >
                  <div class="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                    <div class="flex items-center gap-1.5 text-xs font-semibold text-slate-300">
                      <span class="w-2 h-2 rounded-full" style={{ backgroundColor: STATUS_COLOR[columnStatus] }} />
                      {columnStatus}
                    </div>
                    <span class="text-[10px] font-mono bg-white/5 border border-white/10 text-slate-400 px-1.5 py-0.5 rounded">{columnLeads.length}</span>
                  </div>

                  <div className="space-y-3 flex-1 overflow-y-auto">
                    {columnLeads.map(l => (
                      <div
                        key={l.id}
                        draggable
                        onDragStart={() => handleDragStart(l.id)}
                        className="bg-slate-900 border border-white/10 rounded-xl p-3 shadow-md cursor-grab active:cursor-grabbing transition-all hover:border-indigo-500/40 hover:shadow-indigo-900/10"
                      >
                        <div class="flex justify-between items-start gap-2 mb-2">
                          <span class="text-xs font-bold text-white tracking-tight line-clamp-1">{l.customer}</span>
                          <ScoreRing score={l.score} />
                        </div>
                        <p class="text-[11px] text-slate-400 mb-2 truncate">{l.company}</p>
                        <div class="flex justify-between items-center border-t border-white/5 pt-2 mt-2 text-[10px] text-slate-400">
                          <span class="font-mono">{money(l.value)}</span>
                          <span class="px-1.5 py-0.5 rounded bg-white/5 font-medium truncate max-w-[70px]">{l.assigned.split(' ')[0]}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ---------------------------------------------------------------
       FOLLOW-UPS AND AUTOMATED RULES VIEW
    --------------------------------------------------------------- */
    function FollowupsView({ followups, setFollowups, automations, setAutomations }) {
      const [activeSubTab, setActiveSubTab] = useState("scheduled");

      const toggleAutomation = (id) => {
        setAutomations(automations.map(a => a.id === id ? { ...a, enabled: !a.enabled } : a));
      };

      return (
        <div className="space-y-6 animate-fadeIn">
          <div className="flex border-b border-white/10 gap-4">
            <button 
              onClick={() => setActiveSubTab("scheduled")}
              className={`pb-3 text-sm font-semibold transition-all ${activeSubTab === "scheduled" ? "text-indigo-400 border-b-2 border-indigo-500" : "text-slate-400 hover:text-slate-200"}`}
            >
              Scheduled Outreach ({followups.length})
            </button>
            <button 
              onClick={() => setActiveSubTab("rules")}
              className={`pb-3 text-sm font-semibold transition-all ${activeSubTab === "rules" ? "text-indigo-400 border-b-2 border-indigo-500" : "text-slate-400 hover:text-slate-200"}`}
            >
              Automation Rule Triggers
            </button>
          </div>

          {activeSubTab === "scheduled" ? (
            <div className="grid gap-4 md:grid-cols-2">
              {followups.map(f => (
                <GlassCard key={f.id} className="p-5 flex flex-col justify-between border border-white/5">
                  <div>
                    <div class="flex justify-between items-start gap-4 mb-2">
                      <h4 class="font-semibold text-white text-sm">{f.customer}</h4>
                      <span class="text-[10px] font-mono tracking-wider font-semibold bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 px-2 py-0.5 rounded-full uppercase">
                        {f.channel}
                      </span>
                    </div>
                    <p class="text-xs text-slate-400 mb-3">{f.note}</p>
                  </div>
                  <div class="border-t border-white/5 pt-3 mt-1 flex justify-between items-center text-[11px] text-slate-500">
                    <span class="font-mono flex items-center gap-1"><i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-400"></i> {f.scheduledFor}</span>
                    <span class="inline-flex items-center gap-1 text-slate-400 font-medium bg-white/5 px-2 py-0.5 rounded">
                      Interval: {f.delay}
                    </span>
                  </div>
                </GlassCard>
              ))}
            </div>
          ) : (
            <div className="space-y-4">
              {automations.map(a => (
                <GlassCard key={a.id} className="p-4 flex items-center justify-between border border-white/5">
                  <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-purple-400">
                      <i data-lucide="zap" class="w-4 h-4"></i>
                    </div>
                    <div>
                      <p class="text-sm font-semibold text-slate-200">Trigger Criteria: <span class="text-indigo-300 font-normal">{a.trigger}</span></p>
                      <p class="text-xs text-slate-400 mt-0.5">Execution Action: {a.action}</p>
                    </div>
                  </div>
                  <button 
                    onClick={() => toggleAutomation(a.id)}
                    className={`relative inline-flex h-5 w-9 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none ${a.enabled ? 'bg-indigo-600' : 'bg-slate-700'}`}
                  >
                    <span className={`pointer-events-none inline-block h-4 w-4 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out ${a.enabled ? 'translate-x-4' : 'translate-x-0'}`} />
                  </button>
                </GlassCard>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ---------------------------------------------------------------
       SYSTEM WORKSPACE INTEGRATION DRIVERS
    --------------------------------------------------------------- */
    function IntegrationsView({ integrations, setIntegrations, onToast }) {
      const toggleConnect = (id, name, current) => {
        setIntegrations(integrations.map(i => i.id === id ? { ...i, connected: !i.connected } : i));
        onToast(current ? `Integration node interface link for ${name} torn down.` : `Integration hook array for ${name} handshake verified active.`);
      };

      return (
        <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 animate-fadeIn">
          {integrations.map(i => (
            <GlassCard key={i.id} className="p-5 border border-white/5 flex flex-col justify-between h-[150px]">
              <div>
                <div class="flex justify-between items-center mb-2">
                  <h4 class="font-bold text-white text-sm tracking-tight">{i.name}</h4>
                  <span class={`h-2 w-2 rounded-full ${i.connected ? 'bg-emerald-400 animate-pulse' : 'bg-slate-600'}`} />
                </div>
                <p class="text-xs text-slate-400 line-clamp-2">{i.desc}</p>
              </div>
              <div class="border-t border-white/5 pt-3 mt-2 flex justify-end">
                <button 
                  onClick={() => toggleConnect(i.id, i.name, i.connected)}
                  className={`text-xs px-3 py-1.5 rounded-xl font-semibold transition-all ${i.connected ? 'bg-red-500/10 border border-red-500/20 text-red-400 hover:bg-red-500/20' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
                >
                  {i.connected ? "Disconnect" : "Connect"}
                </button>
              </div>
            </GlassCard>
          ))}
        </div>
      );
    }

    /* ---------------------------------------------------------------
       CORE SYSTEM WORKSPACE ROOT CONTAINER
    --------------------------------------------------------------- */
    function App() {
      const [view, setView] = useState("dashboard");
      const [toast, setToast] = useState(null);

      // System Managed Memory Matrix Data Banks
      const [customers, setCustomers] = useState(INITIAL_CUSTOMERS);
      const [leads, setLeads] = useState(INITIAL_LEADS);
      const [followups, setFollowups] = useState(INITIAL_FOLLOWUPS);
      const [automations, setAutomations] = useState(AUTOMATIONS);
      const [integrations, setIntegrations] = useState(INTEGRATIONS);

      const triggerToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 4000);
      };

      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, toast]);

      return (
        <div className="min-h-screen bg-[#080b11] bg-gradient-to-tr from-[#080b11] via-[#0f172a] to-[#1e1b4b] flex flex-col md:flex-row">
          
          {/* Dashboard Navigation Menu Rails */}
          <aside className="w-full md:w-64 bg-black/30 backdrop-blur-md border-b md:border-b-0 md:border-r border-white/5 p-6 flex flex-col justify-between shrink-0">
            <div>
              <div className="flex items-center gap-3 mb-8">
                <div className="h-9 w-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                  <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                </div>
                <span className="font-extrabold text-lg tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">NEXUS.AI</span>
              </div>

              <nav className="space-y-1.5">
                {[
                  { id: "dashboard", label: "Command Center", icon: "layout-dashboard" },
                  { id: "customers", label: "Customer Matrix", icon: "users" },
                  { id: "leads", label: "Pipeline Taskboard", icon: "target" },
                  { id: "followups", label: "Outreach Engine", icon: "zap" },
                  { id: "integrations", label: "API Handshakes", icon: "link-2" }
                ].map((item) => (
                  <button
                    key={item.id}
                    onClick={() => setView(item.id)}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-semibold tracking-wide uppercase transition-all ${
                      view === item.id 
                        ? 'bg-white/10 text-white border-l-4 border-indigo-500 font-bold' 
                        : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
                    }`}
                  >
                    <i data-lucide={item.icon} class="w-4 h-4"></i>
                    {item.label}
                  </button>
                ))}
              </nav>
            </div>
            
            <div className="hidden md:block p-4 rounded-xl bg-indigo-950/20 border border-indigo-500/10 text-[10px] tracking-wider font-mono text-indigo-400">
              🟢 DATA PIPELINE ACTIVE
            </div>
          </aside>

          {/* Main Panel Ingest Pipeline Screen */}
          <main className="flex-1 p-6 md:p-8 overflow-y-auto h-screen">
            <header className="mb-8 flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-extrabold tracking-tight text-white capitalize">{view.replace('-', ' ')} Pane</h1>
                <p class="text-xs text-slate-400 mt-1">Autonomous follow-up matrix automation logs.</p>
              </div>
              <div class="text-xs font-mono bg-white/5 border border-white/10 px-3 py-1.5 rounded-xl text-slate-400">
                July 2026 Sandbox Build
              </div>
            </header>

            {/* View Component Decoupler Router Switch */}
            <div>
              {view === "dashboard" && <DashboardView customers={customers} leads={leads} followups={followups} />}
              {view === "customers" && <CustomersView customers={customers} setCustomers={setCustomers} onToast={triggerToast} />}
              {view === "leads" && <LeadsView leads={leads} setLeads={setLeads} onToast={triggerToast} />}
              {view === "followups" && <FollowupsView followups={followups} setFollowups={setFollowups} automations={automations} setAutomations={setAutomations} />}
              {view === "integrations" && <IntegrationsView integrations={integrations} setIntegrations={setIntegrations} onToast={triggerToast} />}
            </div>
          </main>

          {/* Core System Toast Notification Stack */}
          {toast && (
            <div className="fixed bottom-6 right-6 z-50 bg-slate-900/90 border border-indigo-500/30 text-indigo-300 text-xs font-medium px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md flex items-center gap-2 border-l-4 border-l-indigo-500 max-w-sm animate-fadeIn">
              <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
              <span>{toast}</span>
            </div>
          )}
        </div>
      );
    }

    // Connect and mount the execution thread layer
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
